workflows:
  ios-release:
    name: iOS TestFlight
    triggering:
      events:
        - tag
      tag_patterns:
        - pattern: 'v*'
          include: true
    environment:
      flutter: stable
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.innovimpactafrica.quickforms
    cache:
      cache_paths:
        - $HOME/.pub-cache
    scripts:
      - flutter pub get
      - flutter build ios --release --no-codesign
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true