name: secure_link
description: "Application mobile Secure Link"
publish_to: 'none'
version: 1.1.0+7

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  shared_preferences: ^2.5.3
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  intl: ^0.20.2
  file_picker: ^10.3.2
  image_picker: ^1.1.2
  flutter_svg: ^2.0.10+1
  intl_phone_field: ^3.2.0
  easy_localization: ^3.0.7
  camera: ^0.11.0+2
  app_links: ^6.3.2   
  http: ^1.2.0
  firebase_core: ^3.6.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  open_filex: ^4.6.0
  flutter_pdfview: ^1.3.2
  pdfrx: ^1.0.98
  cached_network_image: ^3.4.1
  firebase_messaging: ^15.1.3 
  flutter_local_notifications: ^17.2.2 
  syncfusion_flutter_pdfviewer: ^33.1.46

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/SLLOGO.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/SLLOGO.png"